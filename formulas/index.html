<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fórmules</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<style>
:root {
  --bg: #080e1a; --bg2: #0d1627; --bg3: #111d35;
  --card: #0f1c32; --border: #1e3356;
  --accent: #00d4ff; --text: #e2e8f0; --muted: #64748b;
  --danger: #f43f5e; --success: #10b981;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(0,212,255,.07) 0%,transparent 70%);pointer-events:none;z-index:0;}

.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:48px 24px 80px;}

/* HEADER */
header{text-align:center;margin-bottom:40px;animation:fadeDown .7s ease both;}
.label-chip{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:14px;opacity:.8;}
header h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;}
header p{color:var(--muted);font-size:.9rem;font-family:'Space Mono',monospace;}

/* TOP ACTIONS */
.top-actions{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:48px;}
.btn-add{background:var(--accent);color:#080e1a;border:none;border-radius:10px;padding:10px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 20px rgba(0,212,255,.3);}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,255,.4);}
.btn-add .plus{font-size:1.2rem;font-weight:400;}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger-soft{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-danger-soft:hover{border-color:var(--danger);color:var(--danger);}

/* SECTIONS */
.section{margin-bottom:52px;animation:fadeUp .6s ease both;}
.section-header{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.section-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.section-title{font-size:1.3rem;font-weight:700;}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.btn-edit-group{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:.75rem;color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;flex-shrink:0;}
.btn-edit-group:hover{border-color:var(--accent);color:var(--accent);}

/* CARDS */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:13px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 16px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;text-align:center;}
.card::before{content:'';position:absolute;inset:0;background:rgba(var(--cr,0,212,255),.07);opacity:0;transition:opacity .22s;}
.card:hover{border-color:var(--card-color,var(--accent));transform:translateY(-3px);box-shadow:0 8px 28px rgba(var(--cr,0,212,255),.15);}
.card:hover::before{opacity:1;}
.card-formula{font-size:1rem;min-height:34px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;margin-bottom:8px;}
.card-name{font-size:.72rem;color:var(--muted);font-family:'Space Mono',monospace;position:relative;z-index:1;line-height:1.4;}

/* VIEW MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .22s;}
.modal-overlay.active{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:100%;transform:scale(.93) translateY(14px);transition:transform .28s cubic-bezier(.34,1.56,.64,1);position:relative;}
.modal-overlay.active .modal{transform:scale(1) translateY(0);}
.view-modal .modal{max-width:540px;max-height:85vh;overflow-y:auto;}
.modal-header{padding:24px 24px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.modal-title{font-size:1.15rem;font-weight:700;}
.modal-close-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:30px;height:30px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s;}
.modal-close-btn:hover{color:var(--text);border-color:var(--accent);}
.modal-body{padding:22px 24px 24px;}
.modal-main-formula{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:22px;text-align:center;margin-bottom:18px;font-size:1.5rem;overflow-x:auto;}
.modal-desc{color:#94a3b8;font-size:.88rem;line-height:1.7;margin-bottom:20px;font-family:'Space Mono',monospace;}
.modal-sublabel{font-size:.68rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:10px;}
.variants-grid{display:grid;gap:8px;margin-bottom:16px;}
.variant-row-view{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.variant-f{font-size:.95rem;}
.variant-d{font-size:.72rem;color:var(--muted);font-family:'Space Mono',monospace;text-align:right;line-height:1.4;flex-shrink:0;}
.units-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;}
.unit-badge{background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:6px;padding:4px 10px;font-family:'Space Mono',monospace;font-size:.72rem;color:var(--accent);}
.modal-footer{padding:0 24px 20px;display:flex;justify-content:flex-end;gap:8px;}
.btn-delete{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
.btn-delete:hover{border-color:var(--danger);color:var(--danger);}
.btn-edit-formula{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:7px 14px;font-family:'Syne',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;}
.btn-edit-formula:hover{border-color:var(--accent);color:var(--accent);}

/* ADD / EDIT MODAL */
.add-modal .modal{max-width:920px;height:88vh;display:flex;flex-direction:column;}
.add-modal-body{display:grid;grid-template-columns:260px 1fr;flex:1;overflow:hidden;}
.builder-panel{border-right:1px solid var(--border);overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
.builder-panel::-webkit-scrollbar{width:4px;}
.builder-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.builder-label{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--muted);background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px;text-align:center;transition:all .2s;}
.builder-label.connected{border-color:var(--accent);color:var(--accent);}
.tab-bar{display:flex;flex-wrap:wrap;gap:5px;}
.tab-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 9px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--muted);cursor:pointer;transition:all .15s;}
.tab-btn:hover{border-color:var(--accent);color:var(--accent);}
.tab-btn.active{background:var(--accent);color:#080e1a;border-color:var(--accent);}
.tab-content{display:none;flex-wrap:wrap;gap:5px;}
.tab-content.active{display:flex;}
.builder-btn{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-family:'Space Mono',monospace;font-size:.78rem;color:var(--text);cursor:pointer;transition:all .14s;min-width:36px;text-align:center;}
.builder-btn:hover{background:var(--accent);color:#080e1a;border-color:var(--accent);}
.form-panel{overflow-y:auto;padding:20px 22px;}
.form-panel::-webkit-scrollbar{width:4px;}
.form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.field.full{grid-column:1/-1;}
label{font-size:.75rem;font-family:'Space Mono',monospace;color:var(--muted);letter-spacing:.5px;}
label .label-btn{background:transparent;border:1px solid var(--border);border-radius:5px;padding:2px 8px;font-family:'Space Mono',monospace;font-size:.68rem;color:var(--accent);cursor:pointer;float:right;transition:all .14s;}
label .label-btn:hover{background:var(--accent);color:#080e1a;}
input[type=text],input[type=email],select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:.82rem;outline:none;transition:border-color .2s;width:100%;}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--accent);}
select{appearance:none;cursor:pointer;}
select option{background:var(--bg2);}
textarea{resize:vertical;min-height:60px;line-height:1.5;}
.formula-input{background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:9px 12px;color:#7dd3fc;font-family:'Space Mono',monospace;font-size:.82rem;outline:none;transition:all .2s;width:100%;resize:vertical;min-height:52px;}
.formula-input:focus{border-color:var(--accent);}
.formula-input.builder-connected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,212,255,.12);}
.formula-preview{background:var(--bg3);border:1px dotted var(--border);border-radius:9px;padding:12px;min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center;overflow-x:auto;font-size:1.1rem;}
.formula-preview:empty{display:none;}
.new-group-box{background:var(--bg3);border:1px dashed var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;margin-top:-4px;}
.new-group-box.hidden{display:none;}
.color-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.color-row input[type=color]{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);cursor:pointer;background:none;padding:2px;}
.color-preset{width:26px;height:26px;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:all .15s;}
.color-preset:hover,.color-preset.sel{border-color:#fff;transform:scale(1.1);}
.variant-add-row,.unit-add-row{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.variant-inputs{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.remove-row-btn{background:transparent;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;align-self:flex-end;padding:2px 6px;border-radius:5px;transition:all .14s;}
.remove-row-btn:hover{color:var(--danger);}
.form-footer{padding:14px 22px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px;}
.btn-primary{background:var(--accent);color:#080e1a;border:none;border-radius:10px;padding:10px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);}
.btn-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-family:'Syne',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;}
.btn-cancel:hover{border-color:var(--muted);color:var(--text);}

/* EDIT GROUP MODAL */
.edit-group-modal .modal{max-width:460px;}
.edit-group-modal .modal-body{padding:22px 24px 24px;display:flex;flex-direction:column;gap:14px;}
.edit-group-modal .field{margin-bottom:0;}
.eg-footer{padding:14px 24px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 22px;font-family:'Space Mono',monospace;font-size:.82rem;color:var(--text);z-index:9999;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.4);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:.85rem;}

/* SCROLLBARS */
.view-modal .modal::-webkit-scrollbar{width:5px;}
.view-modal .modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ANIMATIONS */
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:700px){
  .add-modal-body{grid-template-columns:1fr;height:auto;overflow:visible;}
  .builder-panel{border-right:none;border-bottom:1px solid var(--border);}
  .add-modal .modal{height:95vh;overflow-y:auto;}
  .form-grid{grid-template-columns:1fr;}
  .variant-inputs{grid-template-columns:1fr;}
  .top-actions{gap:7px;}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="label-chip">Fórmules</div>
    <h1>Llibre de Fórmules</h1>
    <p>Clica una fórmula per veure detalladament · Afegeix les teves pròpies</p>
  </header>

  <div class="top-actions">
    <button class="btn-add" onclick="openAddModal()">
      <span class="plus">＋</span> Nova Fórmula
    </button>
    <button class="btn-secondary" onclick="exportData()">⬇ Exportar JSON</button>
    <label class="btn-secondary" for="import-file" style="cursor:pointer">⬆ Importar JSON</label>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn-danger-soft" onclick="resetToDefault()">↺ Reiniciar</button>
  </div>

  <div id="groups-container"></div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay view-modal" id="view-modal" onclick="handleOverlayClick(event,'view-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="view-modal-title"></div>
      <button class="modal-close-btn" onclick="closeViewModal()">✕</button>
    </div>
    <div class="modal-body" id="view-modal-body"></div>
    <div class="modal-footer">
      <button class="btn-delete" id="delete-btn" onclick="deleteCurrentFormula()">🗑 Eliminar fórmula</button>
      <button class="btn-edit-formula" onclick="openEditFormula()">✏️ Editar fórmula</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT FORMULA MODAL -->
<div class="modal-overlay add-modal" id="add-modal" onclick="handleOverlayClick(event,'add-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="add-modal-title">➕ Nova Fórmula</div>
      <button class="modal-close-btn" onclick="closeAddModal()">✕</button>
    </div>
    <div class="add-modal-body">

      <!-- BUILDER PANEL -->
      <div class="builder-panel">
        <div class="builder-label" id="builder-label">← Fes clic en un camp de fórmula</div>
        <div class="tab-bar" id="tab-bar"></div>
        <div id="tab-contents"></div>
      </div>

      <!-- FORM PANEL -->
      <div class="form-panel">
        <div class="form-grid">
          <div class="field full">
            <label>Títol de la fórmula *</label>
            <input type="text" id="f-title" placeholder="Ex: Potència">
          </div>
          <div class="field full">
            <label>Grup *</label>
            <select id="f-group" onchange="onGroupChange()">
              <option value="">— Selecciona un grup —</option>
            </select>
          </div>
          <div class="new-group-box hidden full" id="new-group-box">
            <div class="field" style="margin:0">
              <label>Nom del nou grup *</label>
              <input type="text" id="ng-title" placeholder="Ex: Termodinàmica">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
              <div class="field" style="margin:0">
                <label>Icona (emoji)</label>
                <input type="text" id="ng-icon" placeholder="🔬" maxlength="4">
              </div>
              <div class="field" style="margin:0">
                <label>Color del grup</label>
                <div class="color-row" id="color-row">
                  <input type="color" id="ng-color" value="#00d4ff" oninput="syncColorPresets(this.value)">
                </div>
              </div>
            </div>
          </div>

          <div class="field full">
            <label>Fórmula principal * <span style="color:var(--muted);float:right">← fes clic aquí per usar el constructor</span></label>
            <textarea id="f-main" class="formula-input" placeholder="Ex: P = \dfrac{E}{t}"
              oninput="updatePreviewById('f-main','prev-main')"
              onfocus="setActiveInput(this,'prev-main','Fórmula principal')"></textarea>
            <div class="formula-preview" id="prev-main"></div>
          </div>

          <div class="field full">
            <label>Descripció</label>
            <textarea id="f-desc" placeholder="Explica breument quan s'utilitza i què representa..."></textarea>
          </div>

          <div class="field full">
            <label>Variants i despejades <button class="label-btn" onclick="addVariantRow()">+ Afegir</button></label>
            <div id="variants-list"></div>
          </div>

          <div class="field full">
            <label>Unitats <button class="label-btn" onclick="addUnitRow()">+ Afegir</button></label>
            <div id="units-list"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel·lar</button>
      <button class="btn-primary" id="add-modal-save-btn" onclick="submitFormula()">💾 Guardar Fórmula</button>
    </div>
  </div>
</div>

<!-- EDIT GROUP MODAL -->
<div class="modal-overlay edit-group-modal" id="edit-group-modal" onclick="handleOverlayClick(event,'edit-group-modal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏️ Editar Grup</div>
      <button class="modal-close-btn" onclick="closeEditGroupModal()">✕</button>
    </div>
    <div class="modal-body" style="padding:22px 24px 8px;display:flex;flex-direction:column;gap:14px;">
      <input type="hidden" id="eg-id">
      <div class="field" style="margin:0">
        <label>Nom del grup *</label>
        <input type="text" id="eg-title" placeholder="Ex: Termodinàmica">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="field" style="margin:0">
          <label>Icona (emoji)</label>
          <input type="text" id="eg-icon" placeholder="🔬" maxlength="4">
        </div>
        <div class="field" style="margin:0">
          <label>Color del grup</label>
          <div class="color-row" id="eg-color-row">
            <input type="color" id="eg-color" value="#00d4ff" oninput="syncEditGroupColorPresets(this.value)">
          </div>
        </div>
      </div>
    </div>
    <div class="eg-footer">
      <button class="btn-cancel" onclick="closeEditGroupModal()">Cancel·lar</button>
      <button class="btn-primary" onclick="saveEditGroup()">💾 Guardar Canvis</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- KaTeX -->
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script>
// ═══════════════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════════════
const DEFAULT_DATA = {groups:[

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let appData = null;
let activeInput = null;
let activePreview = null;
let currentGroupId = null;

let editingGroupId = null;
let editingFormulaId = null;

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function startApp() {
  loadData();
  buildBuilderToolbar();
  buildColorPresets();
  buildEditGroupColorPresets();
  renderAll();
}

function loadData() {
  try {
    const saved = localStorage.getItem('fisica-formules-v2');
    appData = saved ? JSON.parse(saved) : deepClone(DEFAULT_DATA);
  } catch(e) {
    appData = deepClone(DEFAULT_DATA);
  }
}

function saveData() {
  localStorage.setItem('fisica-formules-v2', JSON.stringify(appData));
}

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderAll() {
  const cont = document.getElementById('groups-container');
  cont.innerHTML = '';
  if (!appData.groups.length) {
    cont.innerHTML = '<div class="empty-state">Cap grup encara. Afegeix la primera fórmula! 🚀</div>';
    return;
  }
  appData.groups.forEach((group, gi) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.style.animationDelay = (gi * 0.08) + 's';
    sec.innerHTML = `
      <div class="section-header">
        <div class="section-icon" style="background:rgba(${hexToRgb(group.color)},.12)">${group.icon}</div>
        <div class="section-title">${group.title}</div>
        <div class="section-line"></div>
        <button class="btn-edit-group" onclick="openEditGroupModal('${group.id}')">✏️ Editar grup</button>
      </div>
      <div class="cards-grid">
        ${group.formulas.map(f => `
          <div class="card" onclick="openViewModal('${group.id}','${f.id}')"
            style="--card-color:${group.color};--cr:${hexToRgb(group.color)}">
            <div class="card-formula" style="color:${group.color}">$${f.main}$</div>
            <div class="card-name">${f.title}</div>
          </div>
        `).join('')}
      </div>
    `;
    cont.appendChild(sec);
  });
  renderMathIn(cont);
}

function renderMathIn(el) {
  renderMathInElement(el, {
    delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
    throwOnError:false
  });
}

// ═══════════════════════════════════════════════
// VIEW MODAL
// ═══════════════════════════════════════════════
function openViewModal(gId, fId) {
  const group = appData.groups.find(g => g.id === gId);
  if (!group) return;
  const formula = group.formulas.find(f => f.id === fId);
  if (!formula) return;
  currentGroupId = gId;
  currentFormulaId = fId;

  document.getElementById('view-modal-title').textContent = formula.title;

  const variantsHtml = formula.variants && formula.variants.length
    ? `<div class="modal-sublabel" style="margin-top:18px">Variants i despejades</div>
       <div class="variants-grid">${formula.variants.map(v=>`
         <div class="variant-row-view">
           <div class="variant-f">$${v.f}$</div>
           <div class="variant-d">${v.desc}</div>
         </div>`).join('')}</div>`
    : '';

  const unitsHtml = formula.units && formula.units.length
    ? `<div class="units-row">${formula.units.map(u=>`<span class="unit-badge">${u}</span>`).join('')}</div>`
    : '';

  document.getElementById('view-modal-body').innerHTML = `
    <div class="modal-main-formula">$$${formula.main}$$</div>
    ${formula.description ? `<p class="modal-desc">${formula.description}</p>` : ''}
    ${variantsHtml}
    ${unitsHtml}
  `;

  document.getElementById('view-modal').classList.add('active');
  renderMathIn(document.getElementById('view-modal-body'));
}

function closeViewModal() {
  document.getElementById('view-modal').classList.remove('active');
  currentGroupId = null; currentFormulaId = null;
}

function deleteCurrentFormula() {
  if (!currentGroupId || !currentFormulaId) return;
  if (!confirm('Eliminar aquesta fórmula? Aquesta acció no es pot desfer.')) return;
  const group = appData.groups.find(g => g.id === currentGroupId);
  group.formulas = group.formulas.filter(f => f.id !== currentFormulaId);
  if (!group.formulas.length) {
    if (confirm('El grup ha quedat buit. Eliminar el grup també?')) {
      appData.groups = appData.groups.filter(g => g.id !== currentGroupId);
    }
  }
  saveData(); renderAll(); closeViewModal();
  showToast('Fórmula eliminada 🗑');
}

function openEditFormula() {
  if (!currentGroupId || !currentFormulaId) return;
  const group = appData.groups.find(g => g.id === currentGroupId);
  const formula = group.formulas.find(f => f.id === currentFormulaId);
  if (!group || !formula) return;

  editingGroupId = currentGroupId;
  editingFormulaId = currentFormulaId;

  closeViewModal();
  resetAddForm();
  populateGroupSelect();

  // Pre-fill fields
  document.getElementById('f-title').value = formula.title;
  document.getElementById('f-main').value = formula.main;
  renderPreview(formula.main, document.getElementById('prev-main'));
  document.getElementById('f-desc').value = formula.description || '';
  document.getElementById('f-group').value = group.id;

  // Pre-fill variants
  (formula.variants || []).forEach(v => addVariantRowWithData(v.f, v.desc));

  // Pre-fill units
  (formula.units || []).forEach(u => addUnitRowWithData(u));

  // Change modal UI to edit mode
  document.getElementById('add-modal-title').textContent = '✏️ Editar Fórmula';
  document.getElementById('add-modal-save-btn').textContent = '💾 Guardar Canvis';

  document.getElementById('add-modal').classList.add('active');
}

// ═══════════════════════════════════════════════
// ADD / EDIT MODAL
// ═══════════════════════════════════════════════
function openAddModal() {
  editingGroupId = null;
  editingFormulaId = null;
  resetAddForm();
  populateGroupSelect();
  document.getElementById('add-modal-title').textContent = '➕ Nova Fórmula';
  document.getElementById('add-modal-save-btn').textContent = '💾 Guardar Fórmula';
  document.getElementById('add-modal').classList.add('active');
  addVariantRow();
  addUnitRow();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('active');
  editingGroupId = null;
  editingFormulaId = null;
  document.getElementById('add-modal-title').textContent = '➕ Nova Fórmula';
  document.getElementById('add-modal-save-btn').textContent = '💾 Guardar Fórmula';
}

function resetAddForm() {
  ['f-title','f-main','f-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('prev-main').innerHTML = '';
  document.getElementById('variants-list').innerHTML = '';
  document.getElementById('units-list').innerHTML = '';
  document.getElementById('new-group-box').classList.add('hidden');
  ['ng-title','ng-icon'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ng-color').value = '#00d4ff';
  activeInput = null; activePreview = null;
  document.getElementById('builder-label').textContent = '← Fes clic en un camp de fórmula';
  document.getElementById('builder-label').classList.remove('connected');
}

function populateGroupSelect() {
  const sel = document.getElementById('f-group');
  sel.innerHTML = '<option value="">— Selecciona un grup —</option>';
  appData.groups.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.icon + ' ' + g.title;
    sel.appendChild(opt);
  });
  const newOpt = document.createElement('option');
  newOpt.value = '__new__';
  newOpt.textContent = '✨ Crear nou grup…';
  sel.appendChild(newOpt);
}

function onGroupChange() {
  const val = document.getElementById('f-group').value;
  document.getElementById('new-group-box').classList.toggle('hidden', val !== '__new__');
}

function addVariantRow() {
  const list = document.getElementById('variants-list');
  const n = list.children.length + 1;
  const div = document.createElement('div');
  div.className = 'variant-add-row';
  div.innerHTML = `
    <div class="variant-inputs">
      <div>
        <label style="font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace">Fórmula variant ${n}</label>
        <textarea class="formula-input" placeholder="Ex: E = P \\cdot t" style="min-height:44px;margin-top:4px"
          oninput="updatePreviewDynamic(this)"
          onfocus="setActiveInput(this, this.parentElement.querySelector('.formula-preview'), 'Variant ${n}')"></textarea>
        <div class="formula-preview" style="margin-top:4px;padding:8px;font-size:.95rem;min-height:36px"></div>
      </div>
      <div>
        <label style="font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace">Descripció</label>
        <input type="text" placeholder="Ex: Despejar E" style="margin-top:4px">
      </div>
    </div>
    <button class="remove-row-btn" onclick="this.parentElement.remove()">✕ Eliminar</button>
  `;
  list.appendChild(div);
}

function addVariantRowWithData(fVal, descVal) {
  const list = document.getElementById('variants-list');
  const n = list.children.length + 1;
  const div = document.createElement('div');
  div.className = 'variant-add-row';
  div.innerHTML = `
    <div class="variant-inputs">
      <div>
        <label style="font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace">Fórmula variant ${n}</label>
        <textarea class="formula-input" style="min-height:44px;margin-top:4px"
          oninput="updatePreviewDynamic(this)"
          onfocus="setActiveInput(this, this.parentElement.querySelector('.formula-preview'), 'Variant ${n}')">${fVal || ''}</textarea>
        <div class="formula-preview" style="margin-top:4px;padding:8px;font-size:.95rem;min-height:36px"></div>
      </div>
      <div>
        <label style="font-size:.68rem;color:var(--muted);font-family:'Space Mono',monospace">Descripció</label>
        <input type="text" value="${(descVal || '').replace(/"/g,'&quot;')}" style="margin-top:4px">
      </div>
    </div>
    <button class="remove-row-btn" onclick="this.parentElement.remove()">✕ Eliminar</button>
  `;

  if (fVal) {
    const ta = div.querySelector('textarea');
    const preview = div.querySelector('.formula-preview');
    renderPreview(fVal, preview);
  }
}

function addUnitRow() {
  const list = document.getElementById('units-list');
  const div = document.createElement('div');
  div.className = 'unit-add-row';
  div.style.cssText = 'flex-direction:row;align-items:center;gap:8px;padding:8px 10px;';
  div.innerHTML = `
    <input type="text" placeholder="Ex: P → Watts (W)" style="flex:1">
    <button class="remove-row-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  list.appendChild(div);
}

function addUnitRowWithData(val) {
  const list = document.getElementById('units-list');
  const div = document.createElement('div');
  div.className = 'unit-add-row';
  div.style.cssText = 'flex-direction:row;align-items:center;gap:8px;padding:8px 10px;';
  div.innerHTML = `
    <input type="text" value="${(val || '').replace(/"/g,'&quot;')}" style="flex:1">
    <button class="remove-row-btn" onclick="this.parentElement.remove()">✕</button>
  `;
  list.appendChild(div);
}

function submitFormula() {
  const title = document.getElementById('f-title').value.trim();
  const mainLatex = document.getElementById('f-main').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const groupVal = document.getElementById('f-group').value;

  if (!title) { showToast('⚠️ El títol és obligatori!'); return; }
  if (!mainLatex) { showToast('⚠️ La fórmula principal és obligatoria!'); return; }
  if (!groupVal) { showToast('⚠️ Selecciona un grup!'); return; }

  // Variants
  const variants = [];
  document.querySelectorAll('#variants-list .variant-add-row').forEach(row => {
    const ta = row.querySelector('textarea');
    const inp = row.querySelector('input[type=text]');
    if (ta && ta.value.trim()) variants.push({f: ta.value.trim(), desc: inp ? inp.value.trim() : ''});
  });

  // Units
  const units = [];
  document.querySelectorAll('#units-list .unit-add-row input[type=text]').forEach(inp => {
    if (inp.value.trim()) units.push(inp.value.trim());
  });

  // EDIT MODE
  if (editingGroupId && editingFormulaId) {
    const formulaObj = {id: editingFormulaId, title, main: mainLatex, description: desc, variants, units};

    if (groupVal === '__new__') {
      // Moving to a new group while editing
      const ngTitle = document.getElementById('ng-title').value.trim();
      const ngIcon = document.getElementById('ng-icon').value.trim() || '📐';
      const ngColor = document.getElementById('ng-color').value;
      if (!ngTitle) { showToast('⚠️ Posa un nom al nou grup!'); return; }
      // Remove from old group
      const oldGroup = appData.groups.find(g => g.id === editingGroupId);
      oldGroup.formulas = oldGroup.formulas.filter(f => f.id !== editingFormulaId);
      if (!oldGroup.formulas.length) {
        appData.groups = appData.groups.filter(g => g.id !== editingGroupId);
      }
      appData.groups.push({id:'g-'+Date.now(), title:ngTitle, icon:ngIcon, color:ngColor, formulas:[formulaObj]});
    } else if (groupVal !== editingGroupId) {
      // Moving to different existing group
      const oldGroup = appData.groups.find(g => g.id === editingGroupId);
      oldGroup.formulas = oldGroup.formulas.filter(f => f.id !== editingFormulaId);
      if (!oldGroup.formulas.length) {
        appData.groups = appData.groups.filter(g => g.id !== editingGroupId);
      }
      const newGroup = appData.groups.find(g => g.id === groupVal);
      if (!newGroup) { showToast('⚠️ Grup no trobat!'); return; }
      newGroup.formulas.push(formulaObj);
    } else {
      // Same group, just update
      const group = appData.groups.find(g => g.id === editingGroupId);
      const idx = group.formulas.findIndex(f => f.id === editingFormulaId);
      if (idx !== -1) group.formulas[idx] = formulaObj;
    }

    saveData(); renderAll(); closeAddModal();
    showToast('Fórmula actualitzada! ✅');
    return;
  }

  // ADD MODE
  const formula = {id:'f-'+Date.now(), title, main:mainLatex, description:desc, variants, units};

  if (groupVal === '__new__') {
    const ngTitle = document.getElementById('ng-title').value.trim();
    const ngIcon = document.getElementById('ng-icon').value.trim() || '📐';
    const ngColor = document.getElementById('ng-color').value;
    if (!ngTitle) { showToast('⚠️ Posa un nom al nou grup!'); return; }
    appData.groups.push({id:'g-'+Date.now(), title:ngTitle, icon:ngIcon, color:ngColor, formulas:[formula]});
  } else {
    const group = appData.groups.find(g => g.id === groupVal);
    if (!group) { showToast('⚠️ Grup no trobat!'); return; }
    group.formulas.push(formula);
  }

  saveData(); renderAll(); closeAddModal();
  showToast('Fórmula afegida correctament! 🎉');
}

// ═══════════════════════════════════════════════
// EDIT GROUP MODAL
// ═══════════════════════════════════════════════
function openEditGroupModal(gId) {
  const group = appData.groups.find(g => g.id === gId);
  if (!group) return;
  document.getElementById('eg-id').value = gId;
  document.getElementById('eg-title').value = group.title;
  document.getElementById('eg-icon').value = group.icon;
  document.getElementById('eg-color').value = group.color;
  syncEditGroupColorPresets(group.color);
  document.getElementById('edit-group-modal').classList.add('active');
}

function closeEditGroupModal() {
  document.getElementById('edit-group-modal').classList.remove('active');
}

function saveEditGroup() {
  const gId = document.getElementById('eg-id').value;
  const title = document.getElementById('eg-title').value.trim();
  const icon = document.getElementById('eg-icon').value.trim() || '📐';
  const color = document.getElementById('eg-color').value;

  if (!title) { showToast('⚠️ El nom del grup és obligatori!'); return; }

  const group = appData.groups.find(g => g.id === gId);
  if (!group) return;

  group.title = title;
  group.icon = icon;
  group.color = color;

  saveData(); renderAll(); closeEditGroupModal();
  showToast('Grup actualitzat! ✅');
}

// ═══════════════════════════════════════════════
// BUILDER
// ═══════════════════════════════════════════════
function buildBuilderToolbar() {
  const tabBar = document.getElementById('tab-bar');
  const tabContents = document.getElementById('tab-contents');
  BUILDER_TABS.forEach((tab, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.textContent = tab.label;
    btn.onclick = () => switchTab(tab.id, btn);
    tabBar.appendChild(btn);

    const content = document.createElement('div');
    content.id = 'tab-'+tab.id;
    content.className = 'tab-content' + (i===0?' active':'');
    tab.btns.forEach(b => {
      const el = document.createElement('button');
      el.className = 'builder-btn';
      el.textContent = b.d;
      el.title = b.i;
      el.onclick = () => insertBuilder(b.i, b.c);
      content.appendChild(el);
    });
    tabContents.appendChild(content);
  });
}

function switchTab(tabId, btnEl) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+tabId).classList.add('active');
  btnEl.classList.add('active');
}

function setActiveInput(inputEl, previewEl, label) {
  document.querySelectorAll('.formula-input.builder-connected').forEach(el => el.classList.remove('builder-connected'));
  activeInput = inputEl;
  activePreview = previewEl;
  inputEl.classList.add('builder-connected');
  const lbl = document.getElementById('builder-label');
  lbl.textContent = '⌨️ ' + label;
  lbl.classList.add('connected');
}

function insertBuilder(text, cursorOffset) {
  if (!activeInput) {
    activeInput = document.getElementById('f-main');
    activePreview = document.getElementById('prev-main');
    activeInput.focus();
  }
  const ta = activeInput;
  const start = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.substring(0,start) + text + ta.value.substring(end);
  const pos = start + (cursorOffset !== undefined ? cursorOffset : text.length);
  ta.setSelectionRange(pos, pos);
  ta.focus();
  if (activePreview) renderPreview(ta.value, activePreview);
}

function updatePreviewById(inputId, previewId) {
  const val = document.getElementById(inputId).value.trim();
  renderPreview(val, document.getElementById(previewId));
}

function updatePreviewDynamic(inputEl) {
  const preview = inputEl.parentElement.querySelector('.formula-preview');
  if (preview) renderPreview(inputEl.value.trim(), preview);
}

function renderPreview(latex, previewEl) {
  if (!previewEl) return;
  if (!latex) { previewEl.innerHTML = ''; return; }
  try {
    previewEl.innerHTML = katex.renderToString(latex, {throwOnError:false, displayMode:true});
  } catch(e) {
    previewEl.innerHTML = '<span style="color:#f87171;font-family:monospace;font-size:.8rem">Error de sintaxi</span>';
  }
}

// ═══════════════════════════════════════════════
// COLOR PRESETS (add formula modal)
// ═══════════════════════════════════════════════
function buildColorPresets() {
  const row = document.getElementById('color-row');
  COLOR_PRESETS.forEach(color => {
    const div = document.createElement('div');
    div.className = 'color-preset';
    div.style.background = color;
    div.title = color;
    div.onclick = () => {
      document.getElementById('ng-color').value = color;
      document.querySelectorAll('#color-row .color-preset').forEach(el => el.classList.remove('sel'));
      div.classList.add('sel');
    };
    row.appendChild(div);
  });
}

function syncColorPresets(val) {
  document.querySelectorAll('#color-row .color-preset').forEach(el => {
    el.classList.toggle('sel', el.title === val);
  });
}

// ═══════════════════════════════════════════════
// COLOR PRESETS (edit group modal)
// ═══════════════════════════════════════════════

  const row = document.getElementById('eg-color-row');

function syncEditGroupColorPresets(val) {
  document.querySelectorAll('#eg-color-row .color-preset').forEach(el => {

  });
}

// ═══════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════
function exportData() {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'formules-fisica.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Arxiu exportat com formules-fisica.json 📁');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed.groups || !Array.isArray(parsed.groups)) throw new Error('Format invàlid: falta la clau "groups"');
      appData = parsed;
      saveData(); renderAll();
      showToast('Dades importades correctament! 📂 (' + appData.groups.length + ' grups)');
    } catch(err) {
      showToast('❌ Error al importar: ' + err.message);
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function resetToDefault() {
  if (!confirm('Segur que vols tornar a les fórmules predeterminades?\nEs perdran totes les fórmules afegides.')) return;
  appData = deepClone(DEFAULT_DATA);
  saveData(); renderAll();
  showToast('Dades restaurades al predeterminat ↺');
}

// ═══════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}

function handleOverlayClick(event, modalId) {
  if (event.target === document.getElementById(modalId)) {
    if (modalId === 'view-modal') closeViewModal();
    else if (modalId === 'add-modal') closeAddModal();
    else if (modalId === 'edit-group-modal') closeEditGroupModal();
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeViewModal(); closeAddModal(); closeEditGroupModal(); }
});

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
startApp();
</script>
